name: Build ImmortalWrt APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: luci-app-fancontrol
  IMMORTALWRT_VERSION: "25.12.0"
  TARGET: mediatek
  SUBTARGET: filogic
  SDK_NAME: immortalwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64
  SDK_SHA256: befa29f07c7922876c875d53df753d5d7c2fe2ba4b15fb40c13a2ab38587f6c3

jobs:
  build:
    name: Build APK with ImmortalWrt SDK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            rsync \
            unzip \
            wget \
            zlib1g-dev \
            file \
            zstd

      - name: Download ImmortalWrt SDK
        run: |
          set -eux
          sdk_url="https://downloads.immortalwrt.org/releases/${IMMORTALWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/${SDK_NAME}.tar.zst"
          wget -nv "$sdk_url"
          echo "${SDK_SHA256}  ${SDK_NAME}.tar.zst" | sha256sum -c -
          mkdir -p sdk
          tar --use-compress-program=unzstd -xf "${SDK_NAME}.tar.zst" -C sdk --strip-components=1

      - name: Prepare package in SDK
        run: |
          set -eux
          mkdir -p "sdk/package/${PACKAGE_NAME}"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='release' \
            --exclude='sdk' \
            ./ "sdk/package/${PACKAGE_NAME}/"

      - name: Install feed metadata
        working-directory: sdk
        run: |
          set -eux
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base || true
          ./scripts/feeds install rpcd || true

      - name: Build package
        working-directory: sdk
        run: |
          set -eux
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" > .config
          make defconfig
          grep -Eq "^CONFIG_PACKAGE_${PACKAGE_NAME}=(m|y)$" .config
          make "package/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"

      - name: Collect APK
        run: |
          set -eux
          mkdir -p release
          find sdk/bin/packages -type f \( -name "${PACKAGE_NAME}-*.apk" -o -name "${PACKAGE_NAME}_*.apk" \) \
            ! -name "${PACKAGE_NAME}-src-*.apk" \
            ! -name "${PACKAGE_NAME}_src_*.apk" \
            -print -exec cp -v {} release/ \;
          apk_count="$(find release -maxdepth 1 -type f \( -name "${PACKAGE_NAME}-*.apk" -o -name "${PACKAGE_NAME}_*.apk" \) | wc -l)"
          test "$apk_count" -gt 0
          first_apk="$(find release -maxdepth 1 -type f \( -name "${PACKAGE_NAME}-*.apk" -o -name "${PACKAGE_NAME}_*.apk" \) | sort | head -n 1)"
          cp "$first_apk" "release/${PACKAGE_NAME}_latest_all.apk"
          (
            cd release
            sha256sum *.apk > SHA256SUMS
          )
          cat > release/RELEASE_NOTES.md <<EOF
          Automated APK build for ${PACKAGE_NAME}.

          - SDK: ImmortalWrt ${IMMORTALWRT_VERSION} ${TARGET}/${SUBTARGET}
          - Commit: ${GITHUB_SHA}
          - Branch or tag: ${GITHUB_REF_NAME}

          The versioned APK keeps the package filename generated by the SDK.
          The ${PACKAGE_NAME}_latest_all.apk asset is a convenience copy for
          one-line installs from the rolling continuous release.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-apk
          path: release/*
          if-no-files-found: error

      - name: Publish rolling release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f continuous "${GITHUB_SHA}"
          git push origin refs/tags/continuous --force

          if gh release view continuous >/dev/null 2>&1; then
            gh release view continuous --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset continuous "$asset" -y || true
            done
            gh release upload continuous release/* --clobber
            gh release edit continuous \
              --title "Continuous APK build" \
              --notes-file release/RELEASE_NOTES.md \
              --prerelease
          else
            gh release create continuous release/* \
              --title "Continuous APK build" \
              --notes-file release/RELEASE_NOTES.md \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

      - name: Publish tagged release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              gh release delete-asset "${GITHUB_REF_NAME}" "$asset" -y || true
            done
            gh release upload "${GITHUB_REF_NAME}" release/* --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release/RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" release/* \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release/RELEASE_NOTES.md
          fi
